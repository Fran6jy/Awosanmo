services:
  awosanmo:
    build:
      context: .
      target: runtime
    image: awosanmo:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATA_DIR: /data
      DB_PATH: /data/awosanmo.sqlite
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MAX_DOWNLOAD_RATE: ${MAX_DOWNLOAD_RATE:-0}
      MAX_UPLOAD_RATE: ${MAX_UPLOAD_RATE:-65536}
      TORRENT_PORT: ${TORRENT_PORT:-51413}
      STREAM_TOKEN_TTL_SECONDS: ${STREAM_TOKEN_TTL_SECONDS:-3600}
      MEDIA_SCAN_INTERVAL_SECONDS: ${MEDIA_SCAN_INTERVAL_SECONDS:-45}
      MEDIA_PROBE_TIMEOUT_SECONDS: ${MEDIA_PROBE_TIMEOUT_SECONDS:-20}
      NODE_OPTIONS: --max-old-space-size=384
    ports:
      - "127.0.0.1:4000:4000"
      - "51413:51413/tcp"
      - "51413:51413/udp"
    volumes:
      - /var/lib/awosanmo:/data
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
