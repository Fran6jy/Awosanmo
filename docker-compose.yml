services:
  awosanmo:
    build: .
    restart: unless-stopped
    environment:
      PORT: 4000
      DATA_DIR: /data
      DB_PATH: /data/awosanmo.sqlite
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: change-this-long-random-value
      ADMIN_EMAIL: admin@awosanmo.local
      ADMIN_PASSWORD: change-me-now
      TORRENT_PORT: 51413
    ports:
      - "4000:4000"
      - "51413:51413/tcp"
      - "51413:51413/udp"
    volumes:
      - awosanmo-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  awosanmo-data:
